<!DOCTYPE html>
<html>
  <head></head>
  <body>
    <script>
      function () {
        if (window.panel) {
        window.panel.remove();
        window.panel = null;
        return;
      }
    
      const p = document.createElement("div");
      window.panel = p;
    
      Object.assign(p.style, {
        position: "fixed",
        top: "10px",
        left: "10px",
        width: "150px",
        padding: "15px",
        background: "#222",
        color: "#fff",
        border: "1px solid #444",
        borderRadius: "8px",
        boxShadow: "0 4px 15px rgba(0,0,0,0.5)",
        zIndex: "2147483647",
        fontFamily: "sans-serif",
        textAlign: "center"
      });
    
      const t = document.createElement("div");
      t.innerText = "text";
      t.style.marginBottom = "10px";
      t.style.fontSize = "18px";
    
      const b = document.createElement("button");
      b.innerText = "button";
      b.style.cursor = "pointer";
      b.style.padding = "6px 12px";
      b.onclick = () => {
          t.innerText = "button clicked";
      };
      p.appendChild(t);
      p.appendChild(b);
      document.body.appendChild(p);
      })();
    </script>
  </body>
</html>
